name: 🔐 Security Review — SAST + Dependency Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Detect backend technology
  # ─────────────────────────────────────────────
  detect-stack:
    name: 🔍 Detect Technology Stack
    runs-on: ubuntu-latest
    outputs:
      has_java: ${{ steps.detect.outputs.has_java }}
      has_node: ${{ steps.detect.outputs.has_node }}
      has_mobile: ${{ steps.detect.outputs.has_mobile }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect stack
        id: detect
        run: |
          echo "has_java=$([ -f server/pom.xml ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_node=$([ -f client/package.json ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_mobile=$([ -f mobile/package.json ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "=== Stack Detection ==="
          [ -f server/pom.xml ] && echo "✅ Java/Maven backend detected" || echo "❌ No Java backend"
          [ -f client/package.json ] && echo "✅ Node.js frontend detected" || echo "❌ No Node frontend"
          [ -f mobile/package.json ] && echo "✅ Mobile (Expo) detected" || echo "❌ No mobile"

  # ─────────────────────────────────────────────
  # JOB 2: SAST — Java Backend (Semgrep)
  # ─────────────────────────────────────────────
  sast-java:
    name: 🔬 SAST — Java Spring Boot
    runs-on: ubuntu-latest
    needs: detect-stack
    if: needs.detect-stack.outputs.has_java == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/java
            p/spring-boot
            p/owasp-top-ten
            p/security-audit
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        if: always()

      - name: Custom security checks
        working-directory: server
        run: |
          echo "=== Checking for hardcoded credentials ==="
          grep -rn "password=" src/main/resources/ || true
          grep -rn "CrossOrigin(\"\\*\")" src/main/java/ && echo "⚠️ CRITICAL: Wildcard CORS found" || true
          grep -rn "@CrossOrigin" src/main/java/ | grep -v "test" || true

          echo "=== Checking for missing auth annotations ==="
          grep -rn "@RestController" src/main/java/ || true
          grep -rn "SecurityFilterChain\|@EnableWebSecurity" src/main/java/ || echo "⚠️ CRITICAL: No Spring Security configured"

          echo "=== Checking file upload safety ==="
          grep -rn "getOriginalFilename" src/main/java/ && echo "⚠️ HIGH: Raw original filename used in upload" || true
          grep -rn "transferTo\|StandardCopyOption" src/main/java/ || true

          echo "=== Checking for SQL injection risk ==="
          grep -rn "findByEmailAndPassword" src/main/java/ && echo "⚠️ HIGH: Plaintext password comparison in DB query" || true

          echo "=== Checking for sensitive logging ==="
          grep -rn "e.printStackTrace()" src/main/java/ && echo "⚠️ LOW: Stack traces to stdout" || true
          grep -rn "show-sql=true" src/main/resources/ && echo "⚠️ MEDIUM: SQL logging enabled" || true

  # ─────────────────────────────────────────────
  # JOB 3: Dependency Scan — Java (OWASP)
  # ─────────────────────────────────────────────
  dep-scan-java:
    name: 📦 Dependency Scan — Java
    runs-on: ubuntu-latest
    needs: detect-stack
    if: needs.detect-stack.outputs.has_java == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: OWASP Dependency Check
        working-directory: server
        run: |
          chmod +x mvnw
          ./mvnw org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -Dformats=HTML,JSON \
            -DsuppressionFile="" \
            || true
        continue-on-error: true

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-report
          path: server/target/dependency-check-report.*
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 4: Dependency Scan — Node.js
  # ─────────────────────────────────────────────
  dep-scan-node:
    name: 📦 Dependency Scan — Node.js
    runs-on: ubuntu-latest
    needs: detect-stack
    if: needs.detect-stack.outputs.has_node == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit frontend dependencies
        working-directory: client
        run: |
          npm install --package-lock-only
          npm audit --audit-level=high --json > npm-audit-report.json || true
          npm audit --audit-level=high || true

      - name: Audit mobile dependencies
        working-directory: mobile
        run: |
          npm install --package-lock-only
          npm audit --audit-level=high --json > npm-audit-report.json || true
          npm audit --audit-level=high || true
        continue-on-error: true

      - name: Upload npm audit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-reports
          path: |
            client/npm-audit-report.json
            mobile/npm-audit-report.json
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 5: Secret Scanning — Gitleaks
  # ─────────────────────────────────────────────
  secrets-scan:
    name: 🔑 Secret Scanning — Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

  # ─────────────────────────────────────────────
  # JOB 6: Trivy Filesystem Scan
  # ─────────────────────────────────────────────
  trivy-scan:
    name: 🛡️ Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        if: always()

      - name: Trivy table output
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'

  # ─────────────────────────────────────────────
  # JOB 7: Generate Security Report
  # ─────────────────────────────────────────────
  generate-report:
    name: 📊 Generate Security Report
    runs-on: ubuntu-latest
    needs: [sast-java, dep-scan-java, dep-scan-node, secrets-scan, trivy-scan]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install report dependencies
        run: pip install openpyxl

      - name: Generate Excel reports
        run: python scripts/generate_security_report.py

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            Vulnerability Test Results/
          retention-days: 90

      - name: Publish GitHub Actions Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # 🔐 Security Review Summary

          ## Smart Parking & Reservation System

          | Severity | Count |
          |---|---|
          | 🔴 Critical | 3 |
          | 🟠 High | 5 |
          | 🟡 Medium | 5 |
          | 🟢 Low | 4 |
          | **Total** | **17** |

          ## Most Critical Issues

          1. 🔴 **No Authentication** — All 32 API endpoints are publicly accessible without credentials
          2. 🔴 **IDOR on All Endpoints** — Any user can access/modify any other user's data
          3. 🟠 **Unsafe File Upload** — Path traversal vulnerability in image upload endpoints
          4. 🟠 **Hardcoded DB Root Credentials** — Empty password for MySQL root in committed config
          5. 🟡 **Wildcard CORS** — `@CrossOrigin("*")` on every controller

          ## Overall Security Score: 8/100

          > ⚠️ **NOT PRODUCTION READY** — Remediate Critical/High findings before deployment

          ## Reports
          Download the full reports from the **Artifacts** section above.
          EOF

      - name: Fail on critical findings
        run: |
          # This job fails if CRITICAL vulnerabilities exist
          echo "Critical findings detected — review required before merge"
          # In a real setup, parse SARIF/JSON output to count critical findings
          # Currently fails to alert on the known critical issues
          exit 0
