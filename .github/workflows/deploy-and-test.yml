name: 🚀 Deploy & E2E Selenium Tests — GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build React frontend
  # ─────────────────────────────────────────────
  build:
    name: 🏗️ Build React App
    runs-on: ubuntu-latest
    outputs:
      pages_url: ${{ steps.pages.outputs.base_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build with HashRouter base
        working-directory: client
        env:
          VITE_BASE_URL: /spic-pdd/
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL || 'http://localhost:8080' }}
        run: |
          # Patch vite.config.js with correct base path
          cat > vite.config.js << 'VITE_EOF'
          import { defineConfig } from 'vite'
          import react from '@vitejs/plugin-react'

          export default defineConfig({
            plugins: [react()],
            base: '/spic-pdd/',
          })
          VITE_EOF
          npm run build

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to GitHub Pages
  # ─────────────────────────────────────────────
  deploy:
    name: 📤 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────────
  # JOB 3: Verify Deployment
  # ─────────────────────────────────────────────
  verify-deployment:
    name: ✅ Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Verify deployment returns HTTP 200
        run: |
          URL="${{ needs.deploy.outputs.page_url }}"
          echo "Checking deployment at: $URL"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "Attempt $i — HTTP Status: $STATUS"
            [ "$STATUS" = "200" ] && break
            sleep 15
          done
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Deployment verification failed! Status: $STATUS"
            exit 1
          fi
          echo "✅ Deployment verified successfully!"

  # ─────────────────────────────────────────────
  # JOB 4: Selenium E2E Tests
  # ─────────────────────────────────────────────
  selenium-e2e:
    name: 🧪 Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: [deploy, verify-deployment]
    env:
      BASE_URL: ${{ needs.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Selenium & test dependencies
        run: |
          pip install selenium pytest pytest-html openpyxl webdriver-manager

      - name: Set up Chrome browser
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Display Chrome version
        run: google-chrome --version

      - name: Create test directories
        run: |
          mkdir -p "Test Results/Screenshots"
          mkdir -p "Test Results/Logs"
          mkdir -p "Test Results/HTML"
          mkdir -p "Test Results/Excel"
          mkdir -p "Test Results/Summary"

      - name: Run Selenium E2E tests
        run: |
          python -m pytest \
            selenium-tests/tests/ \
            --html="Test Results/HTML/execution-report.html" \
            --self-contained-html \
            -v \
            --tb=short \
            --capture=tee-sys \
            -o "log_file=Test Results/Logs/pytest.log" \
            --timeout=60
        env:
          BASE_URL: ${{ needs.deploy.outputs.page_url }}
        continue-on-error: true

      - name: Generate Excel test report
        run: python scripts/generate_test_report.py
        env:
          BASE_URL: ${{ needs.deploy.outputs.page_url }}
        continue-on-error: true

      - name: Generate summary
        run: |
          cat > "Test Results/Summary/summary.md" << EOF
          # Live GitHub Pages E2E Test Summary

          **Deployment URL:** ${{ needs.deploy.outputs.page_url }}

          **Run Date:** $(date -u +"%Y-%m-%d %H:%M UTC")

          **Repository:** https://github.com/${{ github.repository }}

          **Branch:** ${{ github.ref_name }}

          **Commit:** ${{ github.sha }}

          ---

          ## Results

          See attached HTML report and Excel workbook for full test results.
          EOF

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-e2e-results
          path: Test Results/
          retention-days: 30

      - name: Publish E2E Summary to GitHub Actions
        if: always()
        run: |
          REPORT_CONTENT=$(cat "Test Results/Summary/summary.md" 2>/dev/null || echo "Summary not available")
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # 🧪 Live GitHub Pages E2E Test Summary

          **Deployment URL:** ${{ needs.deploy.outputs.page_url }}

          **Run Date:** $(date -u +"%Y-%m-%d %H:%M UTC")

          Download full reports from the **Artifacts** section.
          EOF

  # ─────────────────────────────────────────────
  # JOB 5: Publish Reports to GitHub Pages
  # ─────────────────────────────────────────────
  publish-reports:
    name: 📊 Publish Reports to GitHub Pages
    runs-on: ubuntu-latest
    needs: [deploy, selenium-e2e]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Download E2E artifacts
        uses: actions/download-artifact@v4
        with:
          name: selenium-e2e-results
          path: downloaded-results
        continue-on-error: true

      - name: Publish reports to GitHub Pages
        run: |
          BUILD_NUM="${{ github.run_number }}"
          mkdir -p gh-pages/reports/latest
          mkdir -p "gh-pages/reports/history/build-${BUILD_NUM}"

          if [ -d "downloaded-results" ]; then
            cp -r downloaded-results/HTML/. gh-pages/reports/latest/ 2>/dev/null || true
            cp -r downloaded-results/Screenshots/. gh-pages/reports/latest/screenshots/ 2>/dev/null || true
            cp -r downloaded-results/Logs/. gh-pages/reports/latest/logs/ 2>/dev/null || true
            cp -r downloaded-results/HTML/. "gh-pages/reports/history/build-${BUILD_NUM}/" 2>/dev/null || true
          fi

          cd gh-pages
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --cached --quiet || git commit -m "📊 Update test reports — Build #${BUILD_NUM}"
          git push origin gh-pages
        continue-on-error: true
